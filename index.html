<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoria Fiscal Eletrônica - Conciliação NFV vs NFD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; }
        .match { background-color: #d1fae5; color: #065f46; border-left: 4px solid #10b981; }
        .divergente { background-color: #fee2e2; color: #991b1b; border-left: 4px solid #ef4444; }
        .sem-nfv { background-color: #f3f4f6; color: #374151; border-left: 4px solid #6b7280; }
        .alert-box { background-color: #fef3c7; color: #92400e; border: 1px solid #f59e0b; }
    </style>
</head>
<body class="text-gray-800 p-6">

    <div class="max-w-7xl mx-auto">
        <h1 class="text-3xl font-bold mb-2 text-slate-800">Auditoria Fiscal Eletrônica (NFD vs NFV)</h1>
        <p class="text-sm text-slate-600 mb-8">Conciliação de Devoluções com Cálculo Proporcional Inteligente e 16 Variáveis Fiscais.</p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <!-- Input NFV -->
            <div class="bg-white p-4 rounded-lg shadow border border-slate-200">
                <h2 class="text-lg font-semibold mb-2 text-slate-700">1. XML Nota Fiscal de Venda (NFV)</h2>
                <textarea id="xmlNFV" class="w-full h-40 p-2 border border-slate-300 rounded text-xs font-mono bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Cole o conteúdo do XML da Nota de Venda de Origem aqui..."></textarea>
            </div>

            <!-- Input NFD -->
            <div class="bg-white p-4 rounded-lg shadow border border-slate-200">
                <h2 class="text-lg font-semibold mb-2 text-slate-700">2. XML Nota Fiscal de Devolução (NFD)</h2>
                <textarea id="xmlNFD" class="w-full h-40 p-2 border border-slate-300 rounded text-xs font-mono bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Cole o conteúdo do XML da Nota de Devolução aqui..."></textarea>
            </div>
        </div>

        <div class="flex justify-center mb-8">
            <button onclick="executarAuditoria()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg shadow-lg transition duration-200 ease-in-out transform hover:scale-105">
                Executar Auditoria e Conciliação
            </button>
        </div>

        <!-- Container de Resultados -->
        <div id="resultado-auditoria" class="space-y-6"></div>
    </div>

    <script>
        // Definição das 16 Variáveis Fiscais da Matriz
        const MATRIZ_FISCAL = [
            { tag: 'vBC', label: 'Base de ICMS', tipo: 'prop', isCurrency: true },
            { tag: 'vICMS', label: 'Valor do ICMS', tipo: 'prop', isCurrency: true },
            { tag: 'pICMS', label: 'Alíquota do ICMS', tipo: 'direto', isCurrency: false },
            { tag: 'pRedBC', label: 'Perc. Redução Base ICMS', tipo: 'direto', isCurrency: false },
            { tag: 'vBCST', label: 'Base de ICMS ST', tipo: 'prop', isCurrency: true },
            { tag: 'vICMSST', label: 'Valor do ICMS ST', tipo: 'prop', isCurrency: true },
            { tag: 'pICMSST', label: 'Alíquota de ICMS ST', tipo: 'direto', isCurrency: false },
            { tag: 'pMVAST', label: 'MVA / IVA ST', tipo: 'direto', isCurrency: false },
            { tag: 'pRedBCST', label: 'Perc. Redução Base ICMS ST', tipo: 'direto', isCurrency: false },
            { tag: 'vBCFCP', label: 'Base do FCP', tipo: 'prop', isCurrency: true },
            { tag: 'vFCP', label: 'Valor do FCP', tipo: 'prop', isCurrency: true },
            { tag: 'vBCFCPST', label: 'Base do FCP ST', tipo: 'prop', isCurrency: true },
            { tag: 'vFCPST', label: 'Valor do FCP ST', tipo: 'prop', isCurrency: true },
            { tag: 'pDif', label: 'Perc. de Diferimento', tipo: 'direto', isCurrency: false },
            { tag: 'vDesc', label: 'Valor do Desconto', tipo: 'prop', isCurrency: true },
            { tag: 'vICMSDeson', label: 'ICMS Desonerado', tipo: 'prop', isCurrency: true }
        ];

        function parseXML(xmlStr) {
            const parser = new DOMParser();
            return parser.parseFromString(xmlStr, "text/xml");
        }

        function getTagVal(node, tagName) {
            const el = node.getElementsByTagName(tagName)[0];
            return el ? parseFloat(el.textContent) : 0;
        }

        function getTagText(node, tagName) {
            const el = node.getElementsByTagName(tagName)[0];
            return el ? el.textContent : '';
        }

        function formatVal(value, isCurrency) {
            if (isCurrency) {
                return value.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            }
            return value.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 4 }) + '%';
        }

        function getTributacao(itemNode) {
            const imposto = itemNode.getElementsByTagName('imposto')[0];
            if (!imposto) return 'N/A';
            const icmsNode = imposto.getElementsByTagName('ICMS')[0];
            if (!icmsNode) return 'N/A';
            
            const grupo = icmsNode.firstElementChild;
            if (!grupo) return 'N/A';
            
            let cst = getTagText(grupo, 'CST');
            let csosn = getTagText(grupo, 'CSOSN');
            return cst || csosn || 'N/A';
        }

        function executarAuditoria() {
            const strNFV = document.getElementById('xmlNFV').value;
            const strNFD = document.getElementById('xmlNFD').value;
            const container = document.getElementById('resultado-auditoria');
            container.innerHTML = '';

            if (!strNFV || !strNFD) {
                alert("Por favor, cole os XMLs da Venda e da Devolução antes de prosseguir.");
                return;
            }

            const docNFV = parseXML(strNFV);
            const docNFD = parseXML(strNFD);

            const itensNFD = Array.from(docNFD.getElementsByTagName('det'));
            const itensNFV = Array.from(docNFV.getElementsByTagName('det'));
            
            // Busca a chave referenciada na NFD
            let chaveRef = getTagText(docNFD, 'refNFe');
            if(!chaveRef) chaveRef = "Não informada / Ausente";

            itensNFD.forEach(nfdItem => {
                const cEAN = getTagText(nfdItem, 'cEAN');
                const cProdNFD = getTagText(nfdItem, 'cProd');
                const xProd = getTagText(nfdItem, 'xProd');
                const ncm = getTagText(nfdItem, 'NCM');
                
                // Rastreabilidade Primária por EAN/GTIN, fallback para cProd
                let nfvMatch = null;
                if (cEAN && cEAN !== 'SEM GTIN') {
                    nfvMatch = itensNFV.find(i => getTagText(i, 'cEAN') === cEAN);
                }
                if (!nfvMatch) {
                    nfvMatch = itensNFV.find(i => getTagText(i, 'cProd') === cProdNFD);
                }

                if (!nfvMatch) {
                    renderizarCartao(container, 'sem-nfv', xProd, chaveRef, cEAN, cProdNFD, 'N/A', ncm, getTributacao(nfdItem), 'N/A', 0, getTagVal(nfdItem, 'qTrib'), null, null, []);
                    return;
                }

                const cProdNFV = getTagText(nfvMatch, 'cProd');
                const tribNFD = getTributacao(nfdItem);
                const tribNFV = getTributacao(nfvMatch);
                
                const qTribNFD = getTagVal(nfdItem, 'qTrib');
                const qTribNFV = getTagVal(nfvMatch, 'qTrib');
                
                // Detecção de Embalagem/Caixa
                const vUnComNFD = getTagVal(nfdItem, 'vUnCom');
                const vUnComNFV = getTagVal(nfvMatch, 'vUnCom');
                let alertaCaixa = null;
                
                if (vUnComNFD > vUnComNFV * 1.5 && vUnComNFV > 0) {
                    const fator = vUnComNFD / vUnComNFV;
                    alertaCaixa = Math.round(fator);
                }

                // Cálculo Proporcional e Matriz
                let divergenciasTexto = [];
                let linhasTabela = [];
                let statusGeral = 'match'; // assume match inicialmente

                MATRIZ_FISCAL.forEach(campo => {
                    const valNFD = getTagVal(nfdItem, campo.tag);
                    const valNFV = getTagVal(nfvMatch, campo.tag);
                    let valorEsperado = 0;

                    if (campo.tipo === 'prop') {
                        valorEsperado = qTribNFV > 0 ? (valNFV / qTribNFV) * qTribNFD : 0;
                    } else {
                        valorEsperado = valNFV; // Alíquotas são passadas diretamente
                    }

                    // Ignora tags com valor zero em ambas (reduz ruído visual)
                    if(valNFD === 0 && valorEsperado === 0 && valNFV === 0) return;

                    const diferenca = Math.abs(valNFD - valorEsperado);
                    const tolerancia = campo.tipo === 'prop' ? 0.02 : 0.05;
                    const isMatch = diferenca <= tolerancia;
                    
                    let statusLinha = 'OK';
                    if (!isMatch) {
                        statusLinha = 'Divergente';
                        statusGeral = 'divergente';
                        
                        divergenciasTexto.push(`O campo <b>${campo.label}</b> na NFD foi declarado como <b>${formatVal(valNFD, campo.isCurrency)}</b>, mas o valor ${campo.tipo === 'prop' ? 'proporcional esperado' : 'esperado'} (NFV) era de <b>${formatVal(valorEsperado, campo.isCurrency)}</b>.`);
                    }

                    linhasTabela.push(`
                        <tr class="border-b ${!isMatch ? 'bg-red-50' : 'bg-white'} text-sm hover:bg-slate-50 transition-colors">
                            <td class="px-4 py-2 text-slate-700 font-medium">${campo.label}</td>
                            <td class="px-4 py-2 text-slate-600">${formatVal(valorEsperado, campo.isCurrency)}</td>
                            <td class="px-4 py-2 text-slate-600 font-semibold">${formatVal(valNFD, campo.isCurrency)}</td>
                            <td class="px-4 py-2 ${!isMatch ? 'text-red-600 font-bold' : 'text-emerald-600 font-bold'}">${statusLinha}</td>
                            <td class="px-4 py-2 text-slate-500">${formatVal(diferenca, campo.isCurrency)}</td>
                        </tr>
                    `);
                });
                
                // Validação de divergência de CST
                if (tribNFD !== tribNFV) {
                     statusGeral = 'divergente';
                     divergenciasTexto.unshift(`Divergência Tributária Identificada: O código CST/CSOSN da venda foi <b>${tribNFV}</b>, porém a NFD apresenta <b>${tribNFD}</b>.`);
                }

                renderizarCartao(
                    container, statusGeral, xProd, chaveRef, cEAN, cProdNFD, cProdNFV, ncm, 
                    tribNFV, tribNFD, qTribNFV, qTribNFD, alertaCaixa, linhasTabela, divergenciasTexto
                );
            });
        }

        function renderizarCartao(container, status, xProd, chaveRef, cEAN, cProdNFD, cProdNFV, ncm, tribNFV, tribNFD, qVenda, qDev, alertaCaixa, linhasTabela, divergencias) {
            let statusLabel = status.toUpperCase();
            if (status === 'sem-nfv') statusLabel = 'SEM NFV CORRESPONDENTE';
            
            let htmlDiv = document.createElement('div');
            htmlDiv.className = `p-5 rounded-lg shadow-md bg-white ${status}`;
            
            let badgeCaixa = '';
            if (alertaCaixa && status !== 'sem-nfv') {
                badgeCaixa = `<div class="mt-4 mb-2 p-3 rounded alert-box font-medium flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
                    ⚠️ ALERTA: POSSÍVEL DEVOLUÇÃO EM CAIXA/EMBALAGEM (Fator de Conversão ~${alertaCaixa} un)
                </div>`;
            }

            let htmlInterno = `
                <div class="flex justify-between items-start border-b border-gray-200 pb-3 mb-3">
                    <h3 class="text-xl font-bold text-gray-800 uppercase">${xProd}</h3>
                    <span class="px-3 py-1 text-sm font-bold rounded-full ${status === 'match' ? 'bg-emerald-100 text-emerald-800' : (status === 'divergente' ? 'bg-red-100 text-red-800' : 'bg-gray-200 text-gray-800')}">
                        ${statusLabel}
                    </span>
                </div>
                
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 text-sm mb-4">
                    <div>
                        <p><span class="font-semibold text-slate-500">Chave NFref (Venda):</span> ${chaveRef}</p>
                        <p><span class="font-semibold text-slate-500">EAN / GTIN:</span> ${cEAN}</p>
                        <p><span class="font-semibold text-slate-500">NCM:</span> ${ncm}</p>
                    </div>
                    <div>
                        <!-- Nova exigência visual de comparação dos códigos -->
                        <div class="flex flex-col gap-1 p-2 bg-slate-50 rounded border border-slate-200 shadow-inner">
                            <p class="text-xs text-slate-500 font-bold uppercase tracking-wide">Rastreabilidade de Estoque</p>
                            <p><span class="font-semibold text-blue-700">cProd Venda (NFV):</span> <span class="bg-blue-100 px-1 rounded">${cProdNFV}</span></p>
                            <p><span class="font-semibold text-indigo-700">cProd Devolução (NFD):</span> <span class="bg-indigo-100 px-1 rounded">${cProdNFD}</span></p>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 bg-slate-50 p-3 rounded mb-2 border border-slate-200">
                    <div><p class="text-xs text-slate-500">CST/CSOSN Venda</p><p class="font-bold">${tribNFV}</p></div>
                    <div><p class="text-xs text-slate-500">CST/CSOSN Devol.</p><p class="font-bold">${tribNFD}</p></div>
                    <div><p class="text-xs text-slate-500">Qtd Venda Orig.</p><p class="font-bold">${qVenda}</p></div>
                    <div><p class="text-xs text-slate-500">Qtd Devolvida</p><p class="font-bold">${qDev}</p></div>
                </div>

                ${badgeCaixa}
            `;

            if (status !== 'sem-nfv') {
                htmlInterno += `
                <div class="overflow-x-auto mt-4 rounded border border-slate-200">
                    <table class="min-w-full text-left">
                        <thead class="bg-slate-100 text-slate-600 text-xs uppercase">
                            <tr>
                                <th class="px-4 py-2 border-b">Campo Fiscal</th>
                                <th class="px-4 py-2 border-b">NF Venda (Proporcional)</th>
                                <th class="px-4 py-2 border-b">NF Devolução</th>
                                <th class="px-4 py-2 border-b">Status</th>
                                <th class="px-4 py-2 border-b">Diferença</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${linhasTabela.length > 0 ? linhasTabela.join('') : '<tr><td colspan="5" class="text-center p-4 text-slate-500 text-sm">Nenhum valor tributário destacado.</td></tr>'}
                        </tbody>
                    </table>
                </div>`;
            }

            if (divergencias && divergencias.length > 0) {
                htmlInterno += `
                <div class="mt-4 p-4 bg-red-50 border border-red-200 rounded-lg">
                    <h4 class="text-red-800 font-bold mb-2 flex items-center">
                        <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        Apontamento Narrativo das Divergências:
                    </h4>
                    <ul class="list-disc pl-5 text-sm text-red-900 space-y-1">
                        ${divergencias.map(d => `<li>${d}</li>`).join('')}
                    </ul>
                </div>`;
            } else if (status === 'match') {
                htmlInterno += `
                <div class="mt-4 p-3 bg-emerald-50 border border-emerald-200 rounded-lg text-emerald-800 text-sm font-medium flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    Nenhuma divergência de conciliação detectada. Conformidade tributária garantida!
                </div>`;
            }

            htmlDiv.innerHTML = htmlInterno;
            container.appendChild(htmlDiv);
        }
    </script>
</body>
</html>
