<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoria Fiscal Eletrônica - Conciliação NFV vs NFD em Lote</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; scroll-behavior: smooth; }
        .match { background-color: #d1fae5; color: #065f46; border-left: 4px solid #10b981; }
        .divergente { background-color: #fee2e2; color: #991b1b; border-left: 4px solid #ef4444; }
        .sem-nfv { background-color: #f3f4f6; color: #374151; border-left: 4px solid #6b7280; }
        .alert-box { background-color: #fef3c7; color: #92400e; border: 1px solid #f59e0b; }
        
        /* Destaque piscante para o item divergente quando clicado no painel */
        @keyframes piscarDestaque {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .highlight-target { animation: piscarDestaque 1.5s ease-out; }
    </style>
</head>
<body class="text-gray-800 p-6">

    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold mb-1 text-slate-800">Auditoria Fiscal Eletrônica</h1>
                <p class="text-sm text-slate-600">Conciliação de Devoluções em Lote (NFD vs NFV) com 16 Variáveis Fiscais.</p>
            </div>
            <button onclick="limparDados()" class="flex items-center bg-slate-600 hover:bg-slate-700 text-white font-semibold py-2 px-4 rounded shadow transition duration-200">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                Zerar Consulta
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <!-- Input NFV -->
            <div class="bg-white p-4 rounded-lg shadow border border-slate-200">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-lg font-semibold text-slate-700">1. XMLs de Venda (NFV)</h2>
                    <label class="cursor-pointer bg-blue-100 hover:bg-blue-200 text-blue-800 py-1.5 px-3 rounded text-sm font-semibold transition-colors flex items-center shadow-sm">
                        <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                        Selecionar Arquivos
                        <!-- Adicionado atributo 'multiple' -->
                        <input type="file" id="fileNFV" accept=".xml" multiple class="hidden" onchange="lerArquivo(event, 'xmlNFV')">
                    </label>
                </div>
                <textarea id="xmlNFV" class="w-full h-40 p-2 border border-slate-300 rounded text-xs font-mono bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="O conteúdo dos XMLs das Notas de Venda aparecerá aqui após selecionar os arquivos..."></textarea>
            </div>

            <!-- Input NFD -->
            <div class="bg-white p-4 rounded-lg shadow border border-slate-200">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-lg font-semibold text-slate-700">2. XMLs de Devolução (NFD)</h2>
                    <label class="cursor-pointer bg-indigo-100 hover:bg-indigo-200 text-indigo-800 py-1.5 px-3 rounded text-sm font-semibold transition-colors flex items-center shadow-sm">
                        <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                        Selecionar Arquivos
                        <!-- Adicionado atributo 'multiple' -->
                        <input type="file" id="fileNFD" accept=".xml" multiple class="hidden" onchange="lerArquivo(event, 'xmlNFD')">
                    </label>
                </div>
                <textarea id="xmlNFD" class="w-full h-40 p-2 border border-slate-300 rounded text-xs font-mono bg-slate-50 focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="O conteúdo dos XMLs das Notas de Devolução aparecerá aqui após selecionar os arquivos..."></textarea>
            </div>
        </div>

        <div class="flex justify-center mb-8">
            <button onclick="executarAuditoria()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg shadow-lg transition duration-200 ease-in-out transform hover:scale-105 flex items-center">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Executar Auditoria em Lote
            </button>
        </div>

        <!-- Painel Dashboard Visual (Será preenchido via JS) -->
        <div id="painel-resumo" class="mb-8 hidden"></div>

        <!-- Container de Resultados -->
        <div id="resultado-auditoria" class="space-y-6"></div>
    </div>

    <script>
        // --- FUNÇÕES DE INTERFACE ---
        
        // Lê múltiplos arquivos e junta os textos
        async function lerArquivo(event, textAreaId) {
            const files = event.target.files;
            if (!files || files.length === 0) return;

            let textoCombinado = '';
            for (let i = 0; i < files.length; i++) {
                textoCombinado += await readFileAsText(files[i]) + '\n\n';
            }
            
            document.getElementById(textAreaId).value = textoCombinado;
        }

        // Promessa para ler arquivo como texto (necessário para o loop async acima)
        function readFileAsText(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsText(file);
            });
        }

        function limparDados() {
            document.getElementById('xmlNFV').value = '';
            document.getElementById('xmlNFD').value = '';
            document.getElementById('fileNFV').value = '';
            document.getElementById('fileNFD').value = '';
            document.getElementById('resultado-auditoria').innerHTML = '';
            document.getElementById('painel-resumo').innerHTML = '';
            document.getElementById('painel-resumo').classList.add('hidden');
        }

        function rolarParaDivergencia() {
            const el = document.getElementById('primeira-divergencia');
            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                // Remove e adiciona a classe para forçar o reinício da animação piscar
                el.classList.remove('highlight-target');
                void el.offsetWidth; // trigger reflow
                el.classList.add('highlight-target');
            }
        }

        // --- MOTOR DE AUDITORIA ---
        const MATRIZ_FISCAL = [
            { tag: 'vBC', label: 'Base de ICMS', tipo: 'prop', isCurrency: true },
            { tag: 'vICMS', label: 'Valor do ICMS', tipo: 'prop', isCurrency: true },
            { tag: 'pICMS', label: 'Alíquota do ICMS', tipo: 'direto', isCurrency: false },
            { tag: 'pRedBC', label: 'Perc. Redução Base', tipo: 'direto', isCurrency: false },
            { tag: 'vBCST', label: 'Base de ICMS ST', tipo: 'prop', isCurrency: true },
            { tag: 'vICMSST', label: 'Valor do ICMS ST', tipo: 'prop', isCurrency: true },
            { tag: 'pICMSST', label: 'Alíquota de ICMS ST', tipo: 'direto', isCurrency: false },
            { tag: 'pMVAST', label: 'MVA / IVA ST', tipo: 'direto', isCurrency: false },
            { tag: 'pRedBCST', label: 'Perc. Redução ST', tipo: 'direto', isCurrency: false },
            { tag: 'vBCFCP', label: 'Base do FCP', tipo: 'prop', isCurrency: true },
            { tag: 'vFCP', label: 'Valor do FCP', tipo: 'prop', isCurrency: true },
            { tag: 'vBCFCPST', label: 'Base do FCP ST', tipo: 'prop', isCurrency: true },
            { tag: 'vFCPST', label: 'Valor do FCP ST', tipo: 'prop', isCurrency: true },
            { tag: 'pDif', label: 'Perc. Diferimento', tipo: 'direto', isCurrency: false },
            { tag: 'vDesc', label: 'Valor do Desconto', tipo: 'prop', isCurrency: true },
            { tag: 'vICMSDeson', label: 'ICMS Desonerado', tipo: 'prop', isCurrency: true }
        ];

        function parseXMLMultiplo(xmlStr) {
            // Remove a declaração xml (<?xml version...?>) para evitar erros ao juntar vários arquivos
            let stringLimpa = xmlStr.replace(/<\?xml.*?\?>/gi, '');
            // Envolvemos tudo numa tag raiz para o parse funcionar com múltiplos arquivos grudados
            stringLimpa = `<lote>${stringLimpa}</lote>`;
            const parser = new DOMParser();
            return parser.parseFromString(stringLimpa, "text/xml");
        }

        function getTagVal(node, tagName) {
            const el = node.getElementsByTagName(tagName)[0];
            return el ? parseFloat(el.textContent) : 0;
        }

        function getTagText(node, tagName) {
            const el = node.getElementsByTagName(tagName)[0];
            return el ? el.textContent : '';
        }

        function formatVal(value, isCurrency) {
            if (isCurrency) {
                return value.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            }
            return value.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 4 }) + '%';
        }

        function getTributacao(itemNode) {
            const imposto = itemNode.getElementsByTagName('imposto')[0];
            if (!imposto) return 'N/A';
            const icmsNode = imposto.getElementsByTagName('ICMS')[0];
            if (!icmsNode) return 'N/A';
            const grupo = icmsNode.firstElementChild;
            if (!grupo) return 'N/A';
            return getTagText(grupo, 'CST') || getTagText(grupo, 'CSOSN') || 'N/A';
        }

        // Como juntamos tudo, precisamos buscar a chave ref na NFe pai do item
        function getChaveRefPorItem(itemNode) {
            let pai = itemNode.parentNode;
            while (pai && pai.nodeName !== 'NFe' && pai.nodeName !== 'nfeProc' && pai.nodeName !== 'lote') {
                pai = pai.parentNode;
            }
            if (pai) {
                const ref = getTagText(pai, 'refNFe');
                if (ref) return ref;
            }
            return "Não informada / Ausente";
        }

        function executarAuditoria() {
            const strNFV = document.getElementById('xmlNFV').value;
            const strNFD = document.getElementById('xmlNFD').value;
            const container = document.getElementById('resultado-auditoria');
            const painel = document.getElementById('painel-resumo');
            
            container.innerHTML = '';
            painel.innerHTML = '';
            painel.classList.add('hidden');

            if (!strNFV || !strNFD) {
                alert("Por favor, carregue os XMLs da Venda e da Devolução antes de prosseguir.");
                return;
            }

            const docNFV = parseXMLMultiplo(strNFV);
            const docNFD = parseXMLMultiplo(strNFD);

            const itensNFD = Array.from(docNFD.getElementsByTagName('det'));
            const itensNFV = Array.from(docNFV.getElementsByTagName('det'));
            
            // Contadores para o Dashboard
            let cTotal = itensNFD.length;
            let cMatch = 0;
            let cDiv = 0;
            let cSem = 0;
            let primeiraDivergenciaMarcada = false;

            itensNFD.forEach((nfdItem, index) => {
                const cEAN = getTagText(nfdItem, 'cEAN');
                const cProdNFD = getTagText(nfdItem, 'cProd');
                const xProd = getTagText(nfdItem, 'xProd');
                const ncm = getTagText(nfdItem, 'NCM');
                const chaveRef = getChaveRefPorItem(nfdItem);
                
                let nfvMatch = null;
                if (cEAN && cEAN !== 'SEM GTIN') {
                    nfvMatch = itensNFV.find(i => getTagText(i, 'cEAN') === cEAN);
                }
                if (!nfvMatch) {
                    nfvMatch = itensNFV.find(i => getTagText(i, 'cProd') === cProdNFD);
                }

                if (!nfvMatch) {
                    cSem++;
                    renderizarCartao(container, 'sem-nfv', xProd, chaveRef, cEAN, cProdNFD, 'N/A', ncm, getTributacao(nfdItem), 'N/A', 0, getTagVal(nfdItem, 'qTrib'), null, null, [], null);
                    return; // Pula para o próximo
                }

                const cProdNFV = getTagText(nfvMatch, 'cProd');
                const tribNFD = getTributacao(nfdItem);
                const tribNFV = getTributacao(nfvMatch);
                const qTribNFD = getTagVal(nfdItem, 'qTrib');
                const qTribNFV = getTagVal(nfvMatch, 'qTrib');
                const vUnComNFD = getTagVal(nfdItem, 'vUnCom');
                const vUnComNFV = getTagVal(nfvMatch, 'vUnCom');
                let alertaCaixa = null;
                
                if (vUnComNFD > vUnComNFV * 1.5 && vUnComNFV > 0) {
                    alertaCaixa = Math.round(vUnComNFD / vUnComNFV);
                }

                let divergenciasTexto = [];
                let linhasTabela = [];
                let statusGeral = 'match'; 

                MATRIZ_FISCAL.forEach(campo => {
                    const valNFD = getTagVal(nfdItem, campo.tag);
                    const valNFV = getTagVal(nfvMatch, campo.tag);
                    let valorEsperado = campo.tipo === 'prop' ? (qTribNFV > 0 ? (valNFV / qTribNFV) * qTribNFD : 0) : valNFV;

                    if(valNFD === 0 && valorEsperado === 0 && valNFV === 0) return;

                    const diferenca = Math.abs(valNFD - valorEsperado);
                    const isMatch = diferenca <= (campo.tipo === 'prop' ? 0.02 : 0.05);
                    
                    let statusLinha = 'OK';
                    if (!isMatch) {
                        statusLinha = 'Divergente';
                        statusGeral = 'divergente';
                        divergenciasTexto.push(`O campo <b>${campo.label}</b> na NFD foi <b>${formatVal(valNFD, campo.isCurrency)}</b>, o esperado (NFV) era <b>${formatVal(valorEsperado, campo.isCurrency)}</b>.`);
                    }

                    linhasTabela.push(`
                        <tr class="border-b ${!isMatch ? 'bg-red-50' : 'bg-white'} text-sm hover:bg-slate-50">
                            <td class="px-4 py-2 font-medium">${campo.label}</td>
                            <td class="px-4 py-2">${formatVal(valorEsperado, campo.isCurrency)}</td>
                            <td class="px-4 py-2 font-semibold">${formatVal(valNFD, campo.isCurrency)}</td>
                            <td class="px-4 py-2 ${!isMatch ? 'text-red-600 font-bold' : 'text-emerald-600 font-bold'}">${statusLinha}</td>
                        </tr>
                    `);
                });
                
                if (tribNFD !== tribNFV) {
                     statusGeral = 'divergente';
                     divergenciasTexto.unshift(`Divergência Tributária: CST/CSOSN venda <b>${tribNFV}</b> vs NFD <b>${tribNFD}</b>.`);
                }

                // Lógica de contagem e ID âncora
                let idCartao = null;
                if (statusGeral === 'match') cMatch++;
                if (statusGeral === 'divergente') {
                    cDiv++;
                    if (!primeiraDivergenciaMarcada) {
                        idCartao = 'primeira-divergencia';
                        primeiraDivergenciaMarcada = true;
                    }
                }

                renderizarCartao(
                    container, statusGeral, xProd, chaveRef, cEAN, cProdNFD, cProdNFV, ncm, 
                    tribNFV, tribNFD, qTribNFV, qTribNFD, alertaCaixa, linhasTabela, divergenciasTexto, idCartao
                );
            });

            // Renderizar o Dashboard Visual
            renderizarDashboard(cTotal, cMatch, cDiv, cSem);
        }

        function renderizarDashboard(total, match, divergente, semNfv) {
            const painel = document.getElementById('painel-resumo');
            painel.classList.remove('hidden');

            painel.innerHTML = `
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <!-- Card Total -->
                    <div class="bg-white rounded-lg shadow p-4 border-l-4 border-slate-500 flex flex-col justify-center items-center">
                        <span class="text-slate-500 text-sm font-bold uppercase tracking-wider mb-1">Itens Avaliados</span>
                        <span class="text-3xl font-black text-slate-700">${total}</span>
                    </div>
                    
                    <!-- Card Match -->
                    <div class="bg-white rounded-lg shadow p-4 border-l-4 border-emerald-500 flex flex-col justify-center items-center">
                        <span class="text-emerald-600 text-sm font-bold uppercase tracking-wider mb-1">Conformidade (Match)</span>
                        <span class="text-3xl font-black text-emerald-600">${match}</span>
                    </div>

                    <!-- Card Divergência -->
                    <div onclick="${divergente > 0 ? 'rolarParaDivergencia()' : ''}" class="bg-white rounded-lg shadow p-4 border-l-4 border-red-500 flex flex-col justify-center items-center ${divergente > 0 ? 'cursor-pointer hover:bg-red-50 hover:scale-105 transition-all transform' : 'opacity-80'}">
                        <span class="text-red-600 text-sm font-bold uppercase tracking-wider mb-1">Com Divergência</span>
                        <span class="text-3xl font-black text-red-600">${divergente}</span>
                        ${divergente > 0 ? '<span class="text-[10px] text-red-400 mt-1 flex items-center"><svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"></path></svg> Clique para ver o 1º</span>' : ''}
                    </div>

                    <!-- Card Sem NFV -->
                    <div class="bg-white rounded-lg shadow p-4 border-l-4 border-gray-400 flex flex-col justify-center items-center">
                        <span class="text-gray-500 text-sm font-bold uppercase tracking-wider mb-1">Sem NFV / Não Localizado</span>
                        <span class="text-3xl font-black text-gray-500">${semNfv}</span>
                    </div>
                </div>
            `;
        }

        function renderizarCartao(container, status, xProd, chaveRef, cEAN, cProdNFD, cProdNFV, ncm, tribNFV, tribNFD, qVenda, qDev, alertaCaixa, linhasTabela, divergencias, idCartao) {
            let statusLabel = status === 'sem-nfv' ? 'SEM NFV' : status.toUpperCase();
            
            let htmlDiv = document.createElement('div');
            htmlDiv.className = `p-5 rounded-lg shadow-md bg-white ${status}`;
            if (idCartao) htmlDiv.id = idCartao; // Define o ID se for o primeiro divergente
            
            let badgeCaixa = alertaCaixa && status !== 'sem-nfv' ? `<div class="mt-4 mb-2 p-3 rounded alert-box font-medium flex items-center">⚠️ ALERTA: POSSÍVEL DEVOLUÇÃO EM CAIXA/EMBALAGEM (Fator ~${alertaCaixa} un)</div>` : '';

            let htmlInterno = `
                <div class="flex justify-between items-start border-b border-gray-200 pb-3 mb-3">
                    <h3 class="text-xl font-bold text-gray-800 uppercase">${xProd}</h3>
                    <span class="px-3 py-1 text-sm font-bold rounded-full ${status === 'match' ? 'bg-emerald-100 text-emerald-800' : (status === 'divergente' ? 'bg-red-100 text-red-800' : 'bg-gray-200 text-gray-800')}">${statusLabel}</span>
                </div>
                
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 text-sm mb-4">
                    <div>
                        <p><span class="font-semibold text-slate-500">Chave NFref:</span> ${chaveRef}</p>
                        <p><span class="font-semibold text-slate-500">EAN/GTIN:</span> ${cEAN} | <span class="font-semibold text-slate-500">NCM:</span> ${ncm}</p>
                    </div>
                    <div>
                        <div class="flex gap-4 p-2 bg-slate-50 rounded border border-slate-200 shadow-inner">
                            <p><span class="text-xs text-slate-500 font-bold uppercase block">cProd (NFV)</span><span class="bg-blue-100 px-2 py-0.5 rounded font-mono text-blue-800">${cProdNFV}</span></p>
                            <p><span class="text-xs text-slate-500 font-bold uppercase block">cProd (NFD)</span><span class="bg-indigo-100 px-2 py-0.5 rounded font-mono text-indigo-800">${cProdNFD}</span></p>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 bg-slate-50 p-3 rounded mb-2 border border-slate-200">
                    <div><p class="text-xs text-slate-500">CST/CSOSN Venda</p><p class="font-bold">${tribNFV}</p></div>
                    <div><p class="text-xs text-slate-500">CST/CSOSN Devol.</p><p class="font-bold">${tribNFD}</p></div>
                    <div><p class="text-xs text-slate-500">Qtd Venda</p><p class="font-bold">${qVenda}</p></div>
                    <div><p class="text-xs text-slate-500">Qtd Devolvida</p><p class="font-bold">${qDev}</p></div>
                </div>

                ${badgeCaixa}
            `;

            if (status !== 'sem-nfv') {
                htmlInterno += `
                <div class="overflow-x-auto mt-4 rounded border border-slate-200">
                    <table class="min-w-full text-left">
                        <thead class="bg-slate-100 text-slate-600 text-xs uppercase">
                            <tr>
                                <th class="px-4 py-2 border-b">Campo Fiscal</th>
                                <th class="px-4 py-2 border-b">NFV (Esperado)</th>
                                <th class="px-4 py-2 border-b">NFD (Declarado)</th>
                                <th class="px-4 py-2 border-b">Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${linhasTabela.length > 0 ? linhasTabela.join('') : '<tr><td colspan="4" class="text-center p-4 text-slate-500 text-sm">Nenhum valor destacado.</td></tr>'}
                        </tbody>
                    </table>
                </div>`;
            }

            if (divergencias && divergencias.length > 0) {
                htmlInterno += `
                <div class="mt-4 p-4 bg-red-50 border border-red-200 rounded-lg">
                    <h4 class="text-red-800 font-bold mb-2">Divergências Encontradas:</h4>
                    <ul class="list-disc pl-5 text-sm text-red-900 space-y-1">
                        ${divergencias.map(d => `<li>${d}</li>`).join('')}
                    </ul>
                </div>`;
            } else if (status === 'match') {
                htmlInterno += `<div class="mt-4 p-3 bg-emerald-50 border border-emerald-200 rounded-lg text-emerald-800 text-sm font-medium">✔️ Conformidade tributária garantida!</div>`;
            }

            htmlDiv.innerHTML = htmlInterno;
            container.appendChild(htmlDiv);
        }
    </script>
</body>
</html>
