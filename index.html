<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoria Fiscal Eletrônica Avançada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; scroll-behavior: smooth; }
        .match { background-color: #d1fae5; color: #065f46; border-left: 4px solid #10b981; }
        .divergente { background-color: #fee2e2; color: #991b1b; border-left: 4px solid #ef4444; }
        .sem-nfv { background-color: #f3f4f6; color: #374151; border-left: 4px solid #6b7280; }
        
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
        
        @keyframes piscarDestaque {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .highlight-target { animation: piscarDestaque 1.5s ease-out; }
    </style>
</head>
<body class="text-gray-800 p-6">

    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold mb-1 text-slate-800">Auditoria Fiscal Eletrônica</h1>
                <p class="text-sm text-slate-600">Com Inteligência de Recomendação por Similaridade Tributária.</p>
            </div>
            <button onclick="limparDados()" class="flex items-center bg-slate-600 hover:bg-slate-700 text-white font-semibold py-2 px-4 rounded shadow transition duration-200">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                Zerar Consulta
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <div class="bg-white p-4 rounded-lg shadow border border-slate-200">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-lg font-semibold text-slate-700">1. XMLs de Venda (NFV)</h2>
                    <label class="cursor-pointer bg-blue-100 hover:bg-blue-200 text-blue-800 py-1.5 px-3 rounded text-sm font-semibold transition-colors flex items-center shadow-sm">
                        <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                        Selecionar Arquivos
                        <input type="file" id="fileNFV" accept=".xml" multiple class="hidden" onchange="lerArquivo(event, 'xmlNFV')">
                    </label>
                </div>
                <textarea id="xmlNFV" class="w-full h-32 p-2 border border-slate-300 rounded text-xs font-mono bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="XMLs de Venda..."></textarea>
            </div>

            <div class="bg-white p-4 rounded-lg shadow border border-slate-200">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-lg font-semibold text-slate-700">2. XMLs de Devolução (NFD)</h2>
                    <label class="cursor-pointer bg-indigo-100 hover:bg-indigo-200 text-indigo-800 py-1.5 px-3 rounded text-sm font-semibold transition-colors flex items-center shadow-sm">
                        <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                        Selecionar Arquivos
                        <input type="file" id="fileNFD" accept=".xml" multiple class="hidden" onchange="lerArquivo(event, 'xmlNFD')">
                    </label>
                </div>
                <textarea id="xmlNFD" class="w-full h-32 p-2 border border-slate-300 rounded text-xs font-mono bg-slate-50 focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="XMLs de Devolução..."></textarea>
            </div>
        </div>

        <div class="flex justify-center mb-8">
            <button onclick="executarAuditoria()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg shadow-lg transition duration-200 ease-in-out transform hover:scale-105 flex items-center">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Processar Inteligência de Auditoria
            </button>
        </div>

        <div id="avisos" class="mb-6 hidden"></div>
        <div id="painel-resumo" class="mb-8 hidden"></div>
        <div id="resultado-auditoria" class="space-y-6"></div>
    </div>

    <script>
        async function lerArquivo(event, textAreaId) {
            const files = event.target.files;
            if (!files || files.length === 0) return;
            let textosProcessados = [];
            
            for (let i = 0; i < files.length; i++) {
                let conteudo = await readFileAsText(files[i]);
                if (conteudo) {
                    // Remove BOM e qualquer caractere invisível antes da primeira tag '<'
                    conteudo = conteudo.replace(/^\uFEFF/, '');
                    const firstAngle = conteudo.indexOf('<');
                    if (firstAngle !== -1) {
                        conteudo = conteudo.substring(firstAngle);
                    }
                    textosProcessados.push(conteudo.trim());
                }
            }
            document.getElementById(textAreaId).value = textosProcessados.join('\n\n');
        }

        function readFileAsText(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsText(file);
            });
        }

        function limparDados() {
            document.getElementById('xmlNFV').value = ''; document.getElementById('xmlNFD').value = '';
            document.getElementById('fileNFV').value = ''; document.getElementById('fileNFD').value = '';
            document.getElementById('resultado-auditoria').innerHTML = '';
            document.getElementById('painel-resumo').innerHTML = '';
            document.getElementById('painel-resumo').classList.add('hidden');
            document.getElementById('avisos').innerHTML = '';
            document.getElementById('avisos').classList.add('hidden');
        }

        function rolarParaDivergencia() {
            const el = document.getElementById('primeira-divergencia');
            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                el.classList.remove('highlight-target'); void el.offsetWidth; el.classList.add('highlight-target');
            }
        }

        const MATRIZ_FISCAL = [
            { tag: 'vUnCom', label: 'Valor Unitário', tipo: 'direto', isCurrency: true, categoria: 'produto' },
            { tag: 'pRedBC', label: 'Redução de Base ICMS', tipo: 'direto', isCurrency: false, categoria: 'icms' },
            { tag: 'vBC', label: 'Base de ICMS', tipo: 'prop', isCurrency: true, categoria: 'icms' },
            { tag: 'pICMS', label: 'Alíquota do ICMS', tipo: 'direto', isCurrency: false, categoria: 'icms' },
            { tag: 'vICMS', label: 'Valor do ICMS', tipo: 'prop', isCurrency: true, categoria: 'icms' },
            { tag: 'pDif', label: 'Percentual de Diferimento', tipo: 'direto', isCurrency: false, categoria: 'icms' },
            { tag: 'vICMSDif', label: 'Valor do ICMS Diferido', tipo: 'prop', isCurrency: true, categoria: 'icms' },
            { tag: 'pRedBCST', label: 'Redução de Base ST', tipo: 'direto', isCurrency: false, categoria: 'st' },
            { tag: 'vBCST', label: 'Base de ICMS ST', tipo: 'prop', isCurrency: true, categoria: 'st' },
            { tag: 'pMVAST', label: 'MVA / IVA-ST', tipo: 'direto', isCurrency: false, categoria: 'st' },
            { tag: 'pICMSST', label: 'Alíq. ICMS ST', tipo: 'direto', isCurrency: false, categoria: 'st' },
            { tag: 'vICMSST', label: 'Valor do ICMS ST', tipo: 'prop', isCurrency: true, categoria: 'st' },
            { tag: 'vBCFCP', label: 'Base FCP', tipo: 'prop', isCurrency: true, categoria: 'fcp' },
            { tag: 'pFCP', label: 'Alíquota FCP', tipo: 'direto', isCurrency: false, categoria: 'fcp' },
            { tag: 'vFCP', label: 'Valor FCP', tipo: 'prop', isCurrency: true, categoria: 'fcp' },
            { tag: 'vBCFCPST', label: 'Base FCP ST', tipo: 'prop', isCurrency: true, categoria: 'fcp' },
            { tag: 'pFCPST', label: 'Alíquota FCP ST', tipo: 'direto', isCurrency: false, categoria: 'fcp' },
            { tag: 'vFCPST', label: 'Valor FCP ST', tipo: 'prop', isCurrency: true, categoria: 'fcp' },
            { tag: 'vDesc', label: 'Valor Desconto', tipo: 'prop', isCurrency: true, categoria: 'outros' }
        ];

        const CATEGORIAS = {
            produto:{ titulo: 'Produto',                   cor: 'sky'    },
            icms:   { titulo: 'ICMS Próprio',              cor: 'blue'   },
            st:     { titulo: 'ICMS Substituição (ST)',    cor: 'purple' },
            fcp:    { titulo: 'FCP / FCP-ST',              cor: 'amber'  },
            outros: { titulo: 'Descontos e Outros',        cor: 'slate'  }
        };

        // ===================== LEITURA DE XML =====================

        function getTagText(node, tagName) {
            if (!node) return '';
            const nsNodes = node.getElementsByTagNameNS('*', tagName);
            if (nsNodes.length > 0) return (nsNodes[0].textContent || '').trim();
            const normalNodes = node.getElementsByTagName(tagName);
            if (normalNodes.length > 0) return (normalNodes[0].textContent || '').trim();
            return '';
        }

        function getTagVal(node, tagName) {
            const val = getTagText(node, tagName);
            return val ? parseFloat(val) : 0;
        }

        function primeiroElemento(node, tagName) {
            if (!node) return null;
            const ns = node.getElementsByTagNameNS('*', tagName);
            if (ns.length > 0) return ns[0];
            const normal = node.getElementsByTagName(tagName);
            return normal.length > 0 ? normal[0] : null;
        }

        function todosElementos(node, tagName) {
            if (!node) return [];
            const ns = Array.from(node.getElementsByTagNameNS('*', tagName));
            if (ns.length > 0) return ns;
            return Array.from(node.getElementsByTagName(tagName));
        }

        function formatVal(value, isCurrency) {
            if (isCurrency) return value.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            return value.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 4 }) + '%';
        }

        function extrairNumNFDaChave(chave) {
            if (chave && chave.length === 44) {
                return Number(chave.substring(25, 34)).toString();
            }
            return "N/A";
        }

        function splitXmlDocs(text) {
            if (!text || !text.trim()) return [];
            
            // Remove lixo inicial
            const firstAngle = text.indexOf('<');
            if (firstAngle > 0) {
                text = text.substring(firstAngle);
            }

            // Separa por qualquer tag raiz comum de nota fiscal eletrônica
            let parts = text.split(/(?=<\?xml|<nfeProc|<NFe\b|<enviNFe\b|<retEnviNFe\b)/i);
            
            return parts.map(s => {
                s = s.trim();
                const idx = s.indexOf('<');
                return idx > 0 ? s.substring(idx) : s;
            }).filter(Boolean);
        }

        function extrairItem(det, noteMeta) {
            const prod = primeiroElemento(det, 'prod');
            const cEANraw = getTagText(prod, 'cEAN');
            const cEANTribraw = getTagText(prod, 'cEANTrib');
            const cProd = getTagText(prod, 'cProd');
            const xProd = getTagText(prod, 'xProd');
            const qCom = getTagVal(prod, 'qCom') || 1;
            const vUnCom = getTagVal(prod, 'vUnCom');
            const vProd = getTagVal(prod, 'vProd');

            const up = s => (s || '').trim().toUpperCase();
            const codes = [];
            if (up(cEANraw) && up(cEANraw) !== 'SEM GTIN') codes.push(up(cEANraw));
            if (up(cEANTribraw) && up(cEANTribraw) !== 'SEM GTIN' && !codes.includes(up(cEANTribraw))) codes.push(up(cEANTribraw));

            const imposto = primeiroElemento(det, 'imposto');
            const icmsNode = primeiroElemento(imposto, 'ICMS');
            const grupo = icmsNode ? icmsNode.firstElementChild : null;
            const cst = grupo ? (getTagText(grupo, 'CST') || getTagText(grupo, 'CSOSN') || 'N/A') : 'N/A';

            const fiscal = {};
            MATRIZ_FISCAL.forEach(campo => {
                if (campo.tag === 'vUnCom') return;
                fiscal[campo.tag] = grupo ? getTagVal(grupo, campo.tag) : 0;
            });
            fiscal.vUnCom = vUnCom;

            return { cEAN: up(cEANraw), cProd, xProd, qCom, vUnCom, vProd, codes, cst, ...fiscal, ...noteMeta };
        }

        function parseNFeDoc(xmlText) {
            let doc;
            try {
                doc = new DOMParser().parseFromString(xmlText.trim(), 'text/xml');
            } catch (e) {
                return { erro: 'Falha ao interpretar o XML: ' + e.message };
            }

            const errEl = doc.getElementsByTagName('parsererror')[0];
            if (errEl) {
                const msg = (errEl.textContent || '').replace(/\s+/g, ' ').trim();
                return { erro: 'XML mal formado — ' + (msg ? msg.slice(0, 250) : 'erro desconhecido de sintaxe.') };
            }

            const infNFe = primeiroElemento(doc, 'infNFe');
            if (!infNFe) {
                const preview = xmlText.replace(/\s+/g, ' ').trim().slice(0, 120);
                return { erro: 'Não encontrei a tag <infNFe> — isso indica que o conteúdo não é uma NFe válida. Preview: "' + preview + '..."' };
            }

            const idAttr = infNFe.getAttribute('Id') || '';
            const chave = idAttr.replace(/^NFe/i, '');
            const ide = primeiroElemento(doc, 'ide');
            const nNF = getTagText(ide, 'nNF');
            const serie = getTagText(ide, 'serie');
            const dhEmi = getTagText(ide, 'dhEmi') || getTagText(ide, 'dEmi');

            const refs = todosElementos(doc, 'refNFe').map(r => (r.textContent || '').trim());
            const refNums = refs.map(extrairNumNFDaChave);

            const noteMeta = { chave, nNF, serie, dhEmi, refs, refNums };
            const dets = todosElementos(doc, 'det');

            if (dets.length === 0) {
                return { erro: 'A nota ' + (nNF || chave || '') + ' foi lida, mas não encontrei nenhuma tag <det> (item).' };
            }

            const itens = dets.map(det => extrairItem(det, noteMeta));
            return { chave, nNF, itens };
        }

        function parseCaixaTexto(texto) {
            const docs = splitXmlDocs(texto);
            const itens = [];
            const erros = [];
            docs.forEach((docTexto, idx) => {
                try {
                    const resultado = parseNFeDoc(docTexto);
                    if (resultado.erro) { erros.push({ indice: idx + 1, motivo: resultado.erro }); return; }
                    itens.push(...resultado.itens);
                } catch (e) {
                    erros.push({ indice: idx + 1, motivo: 'Erro inesperado ao processar: ' + e.message });
                }
            });
            return { itens, erros, totalDocs: docs.length };
        }

        // ===================== COMPARAÇÃO / SCORING =====================

        function compararItens(nfdItem, nfvItem) {
            const proporcao = nfvItem.qCom > 0 ? (nfdItem.qCom / nfvItem.qCom) : 0;
            let linhasTabela = [];
            let chipsPorCategoria = { produto: [], icms: [], st: [], fcp: [], outros: [] };
            let divergenciasTexto = [];
            let statusGeral = 'match';
            let camposComparados = 0, camposBatendo = 0;

            MATRIZ_FISCAL.forEach(campo => {
                const valNFD = nfdItem[campo.tag] || 0;
                const valNFV = nfvItem[campo.tag] || 0;

                let valorEsperado, memoCalculo;
                if (campo.tipo === 'prop') {
                    valorEsperado = valNFV * proporcao;
                    memoCalculo = `(NFV: ${formatVal(valNFV, campo.isCurrency)} ÷ ${nfvItem.qCom} × ${nfdItem.qCom})`;
                } else {
                    valorEsperado = valNFV;
                    memoCalculo = campo.tag === 'vUnCom' ? '(Comparação direta)' : '(Cópia Direta)';
                }

                if (valNFD === 0 && valorEsperado === 0 && valNFV === 0) return;
                camposComparados++;

                const diferenca = Math.abs(valNFD - valorEsperado);
                const isMatch = diferenca <= 0.05;
                if (isMatch) camposBatendo++;

                let statusLinha = '✅ CERTO';
                if (!isMatch) {
                    statusLinha = '❌ ERRADO'; statusGeral = 'divergente';
                    divergenciasTexto.push(`<b>${campo.label}:</b> A devolução declarou <b>${formatVal(valNFD, campo.isCurrency)}</b>, mas a regra exige <b>${formatVal(valorEsperado, campo.isCurrency)}</b> <span class="text-xs text-slate-500 font-mono">${memoCalculo}</span>.`);
                }

                chipsPorCategoria[campo.categoria].push({
                    label: campo.label, esperado: valorEsperado, declarado: valNFD,
                    isCurrency: campo.isCurrency, isMatch
                });

                linhasTabela.push(`
                    <tr class="border-b ${!isMatch ? 'bg-red-50' : 'bg-white'} text-sm hover:bg-slate-50">
                        <td class="px-3 py-2 font-medium text-slate-800">${campo.label}</td>
                        <td class="px-3 py-2 text-xs text-slate-500 font-mono">${memoCalculo}</td>
                        <td class="px-3 py-2 font-semibold text-slate-700">${formatVal(valorEsperado, campo.isCurrency)}</td>
                        <td class="px-3 py-2 font-bold ${!isMatch ? 'text-red-600' : 'text-slate-700'}">${formatVal(valNFD, campo.isCurrency)}</td>
                        <td class="px-3 py-2 font-bold ${!isMatch ? 'text-red-600' : 'text-emerald-600'} text-center">${statusLinha}</td>
                    </tr>
                `);
            });

            const cstMatch = nfdItem.cst === nfvItem.cst;
            if (!cstMatch) {
                statusGeral = 'divergente';
                divergenciasTexto.unshift(`<b>Divergência de CST/CSOSN:</b> O item foi vendido como <b>${nfvItem.cst}</b>, mas está sendo devolvido como <b>${nfdItem.cst}</b>.`);
            }

            const score = (camposComparados + 2) > 0 ? (camposBatendo + (cstMatch ? 2 : 0)) / (camposComparados + 2) : 0;
            return { linhasTabela, chipsPorCategoria, divergenciasTexto, statusGeral, score };
        }

        // ===================== EXECUÇÃO PRINCIPAL =====================

        function executarAuditoria() {
            const strNFV = document.getElementById('xmlNFV').value;
            const strNFD = document.getElementById('xmlNFD').value;
            const container = document.getElementById('resultado-auditoria');

            container.innerHTML = '';
            document.getElementById('painel-resumo').innerHTML = '';
            document.getElementById('painel-resumo').classList.add('hidden');
            document.getElementById('avisos').innerHTML = '';
            document.getElementById('avisos').classList.add('hidden');

            if (!strNFV || !strNFD) return alert("Carregue os XMLs da Venda e da Devolução.");

            const { itens: itensNFD, erros: errosNFD, totalDocs: totalNFD } = parseCaixaTexto(strNFD);
            const { itens: itensNFV, erros: errosNFV, totalDocs: totalNFV } = parseCaixaTexto(strNFV);

            renderizarAvisos(errosNFD, totalNFD, errosNFV, totalNFV);

            if (itensNFD.length === 0) return alert("Não consegui ler nenhum item das notas de DEVOLUÇÃO.");
            if (itensNFV.length === 0) return alert("Não consegui ler nenhum item das notas de VENDA.");

            let cTotal = itensNFD.length, cMatch = 0, cDiv = 0, cSem = 0, primDiv = false;

            itensNFD.forEach(nfdItem => {
                const chavesRef = nfdItem.refs;
                const chaveRefPrincipal = chavesRef.length > 0 ? chavesRef[0] : "Não informada";
                const nNFRef = chavesRef.length > 0 ? nfdItem.refNums[0] : extrairNumNFDaChave(chaveRefPrincipal);

                const bateCodigo = (a, b) => a.codes.some(c => b.codes.includes(c)) || (a.cProd && a.cProd === b.cProd);

                let escopo = itensNFV;
                if (chavesRef.length > 0) {
                    const filtrados = itensNFV.filter(i => chavesRef.includes(i.chave) || nfdItem.refNums.includes(i.nNF));
                    if (filtrados.length > 0) escopo = filtrados;
                }

                let itensEncontrados = escopo.filter(i => bateCodigo(nfdItem, i));

                if (itensEncontrados.length === 0) {
                    itensEncontrados = itensNFV.filter(i => bateCodigo(nfdItem, i));
                }

                const vistos = new Set();
                itensEncontrados = itensEncontrados.filter(i => {
                    const chave = i.chave + '|' + i.cProd + '|' + i.nNF;
                    if (vistos.has(chave)) return false;
                    vistos.add(chave);
                    return true;
                });

                if (itensEncontrados.length === 0) {
                    cSem++;
                    renderizarCartao(container, 'sem-nfv', nfdItem.xProd, chaveRefPrincipal, nNFRef, nfdItem.cEAN, nfdItem.cProd, 'N/A', 'N/A', nfdItem.cst, 0, nfdItem.qCom, [], [], null, {produto:[],icms:[],st:[],fcp:[],outros:[]}, null, []);
                    return;
                }

                const comparacoes = itensEncontrados
                    .map(candidato => ({ item: candidato, ...compararItens(nfdItem, candidato) }))
                    .sort((a, b) => b.score - a.score);

                const melhor = comparacoes[0];
                const outras = comparacoes.slice(1);

                const infoRecomendacao = itensEncontrados.length > 1
                    ? `🔍 <b>Inteligência Fiscal Ativada:</b> este produto foi localizado em <b>${itensEncontrados.length}</b> notas de venda diferentes. O sistema recomenda a NF-e <b>${melhor.item.nNF}</b> por ter a maior aderência de tributação e valores fiscais com esta devolução (<b>${Math.round(melhor.score * 100)}%</b>).`
                    : null;

                let idCartao = null;
                if (melhor.statusGeral === 'match') cMatch++;
                if (melhor.statusGeral === 'divergente') {
                    cDiv++; if (!primDiv) { idCartao = 'primeira-divergencia'; primDiv = true; }
                }

                renderizarCartao(
                    container, melhor.statusGeral, nfdItem.xProd, chaveRefPrincipal, melhor.item.nNF,
                    nfdItem.cEAN, nfdItem.cProd, melhor.item.cProd, melhor.item.cst, nfdItem.cst,
                    melhor.item.qCom, nfdItem.qCom, melhor.linhasTabela, melhor.divergenciasTexto,
                    idCartao, melhor.chipsPorCategoria, infoRecomendacao, outras
                );
            });

            renderizarDashboard(cTotal, cMatch, cDiv, cSem);
        }

        // ===================== COMPONENTES VISUAIS =====================

        function renderizarAvisos(errosNFD, totalNFD, errosNFV, totalNFV) {
            const el = document.getElementById('avisos');
            const blocos = [];

            function montaBloco(titulo, erros, total) {
                if (erros.length === 0) return '';
                const linhas = erros.slice(0, 8).map(e => `<li><b>Arquivo ${e.indice}:</b> ${e.motivo}</li>`).join('');
                const resto = erros.length > 8 ? `<li class="italic">...e mais ${erros.length - 8} arquivo(s) com problema.</li>` : '';
                return `
                <div class="mb-2">
                    <p class="font-bold">⚠️ ${titulo}: ${erros.length} de ${total} arquivo(s) não puderam ser lidos.</p>
                    <ul class="list-disc pl-6 mt-1 space-y-1 font-mono text-xs">${linhas}${resto}</ul>
                </div>`;
            }

            blocos.push(montaBloco('Notas de devolução', errosNFD, totalNFD));
            blocos.push(montaBloco('Notas de venda', errosNFV, totalNFV));
            const conteudo = blocos.filter(Boolean).join('');
            if (!conteudo) return;

            el.classList.remove('hidden');
            el.innerHTML = `<div class="p-4 bg-amber-50 border border-amber-300 rounded text-amber-900 text-sm">${conteudo}</div>`;
        }

        function renderizarDashboard(total, match, divergente, semNfv) {
            const painel = document.getElementById('painel-resumo');
            painel.classList.remove('hidden');
            painel.innerHTML = `
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="bg-white rounded-lg shadow p-4 border-l-4 border-slate-500 flex flex-col justify-center items-center">
                        <span class="text-slate-500 text-sm font-bold uppercase tracking-wider mb-1">Itens Analisados</span>
                        <span class="text-3xl font-black text-slate-700">${total}</span>
                    </div>
                    <div class="bg-white rounded-lg shadow p-4 border-l-4 border-emerald-500 flex flex-col justify-center items-center">
                        <span class="text-emerald-600 text-sm font-bold uppercase tracking-wider mb-1">✅ OK (Match)</span>
                        <span class="text-3xl font-black text-emerald-600">${match}</span>
                    </div>
                    <div onclick="${divergente > 0 ? 'rolarParaDivergencia()' : ''}" class="bg-white rounded-lg shadow p-4 border-l-4 border-red-500 flex flex-col justify-center items-center ${divergente > 0 ? 'cursor-pointer hover:bg-red-50 hover:scale-105 transition-all' : 'opacity-80'}">
                        <span class="text-red-600 text-sm font-bold uppercase tracking-wider mb-1">❌ Divergentes</span>
                        <span class="text-3xl font-black text-red-600">${divergente}</span>
                        ${divergente > 0 ? '<span class="text-[10px] text-red-400 mt-1">Ver 1º Erro ⬇️</span>' : ''}
                    </div>
                    <div class="bg-white rounded-lg shadow p-4 border-l-4 border-gray-400 flex flex-col justify-center items-center">
                        <span class="text-gray-500 text-sm font-bold uppercase tracking-wider mb-1">⚠️ Sem NF Venda</span>
                        <span class="text-3xl font-black text-gray-500">${semNfv}</span>
                    </div>
                </div>
            `;
        }

        function renderizarChips(chipsPorCategoria) {
            let html = '';
            Object.keys(CATEGORIAS).forEach(catKey => {
                const chips = chipsPorCategoria[catKey];
                if (!chips || chips.length === 0) return;
                const meta = CATEGORIAS[catKey];
                html += `
                <div class="mb-4 last:mb-0">
                    <p class="text-xs font-bold uppercase tracking-wider text-${meta.cor}-700 mb-2 flex items-center">
                        <span class="w-2 h-2 rounded-full bg-${meta.cor}-500 mr-2"></span>${meta.titulo}
                    </p>
                    <div class="flex flex-wrap gap-2">
                        ${chips.map(c => `
                            <div class="flex items-center text-xs rounded-full pl-3 pr-2 py-1.5 border ${c.isMatch ? 'bg-emerald-50 border-emerald-200 text-emerald-800' : 'bg-red-50 border-red-300 text-red-900'}">
                                <span class="font-semibold mr-2">${c.label}</span>
                                <span class="font-mono text-slate-500">Venda ${formatVal(c.esperado, c.isCurrency)}</span>
                                <span class="mx-1.5 text-slate-400">→</span>
                                <span class="font-mono font-bold ${c.isMatch ? '' : 'text-red-700'}">Devol. ${formatVal(c.declarado, c.isCurrency)}</span>
                                <span class="ml-2 ${c.isMatch ? 'text-emerald-600' : 'text-red-600'}">${c.isMatch ? '✓' : '✕'}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
            });
            return html || '<p class="text-sm text-slate-400 italic">Nenhum imposto composto encontrado para este item.</p>';
        }

        function renderizarBlocoComparacao(chipsPorCategoria, linhasTabela) {
            return `
                <div class="p-4 bg-white border-b border-slate-200">
                    <p class="text-sm font-bold text-slate-600 mb-3">📊 Comparativo Visual (Venda → Devolução)</p>
                    ${renderizarChips(chipsPorCategoria)}
                </div>
                <div class="overflow-x-auto">
                    <table class="min-w-full text-left whitespace-nowrap">
                        <caption class="text-left text-xs font-bold text-slate-500 uppercase tracking-wider px-3 pt-3 pb-2 bg-slate-50">🧮 Tabela Técnica (fórmulas e valores completos)</caption>
                        <thead class="bg-slate-100 text-slate-600 text-xs uppercase">
                            <tr>
                                <th class="px-3 py-2 border-b">Campo Fiscal</th>
                                <th class="px-3 py-2 border-b">Cálculo Adotado</th>
                                <th class="px-3 py-2 border-b">Valor Esperado</th>
                                <th class="px-3 py-2 border-b">Valor NFD</th>
                                <th class="px-3 py-2 border-b text-center">Status</th>
                            </tr>
                        </thead>
                        <tbody>${linhasTabela.join('')}</tbody>
                    </table>
                </div>
            `;
        }

        function renderizarOutrasNotas(outras) {
            if (!outras || outras.length === 0) return '';
            return `
            <div class="mt-4 p-4">
                <p class="text-sm font-bold text-slate-600 mb-2">📋 Outras notas de venda encontradas com este produto (${outras.length}):</p>
                <div class="space-y-2">
                    ${outras.map((o, idx) => `
                        <details class="border border-slate-200 rounded-lg bg-slate-50 overflow-hidden">
                            <summary class="cursor-pointer p-2.5 px-3 hover:bg-slate-100 text-sm flex justify-between items-center font-semibold text-slate-700">
                                <span>Alternativa ${idx + 1}: NF-e ${o.item.nNF} (Aderência: ${Math.round(o.score * 100)}%)</span>
                                <span class="text-xs ${o.statusGeral === 'match' ? 'text-emerald-600' : 'text-red-600'}">${o.statusGeral.toUpperCase()}</span>
                            </summary>
                            <div class="border-t border-slate-200 bg-white">
                                ${renderizarBlocoComparacao(o.chipsPorCategoria, o.linhasTabela)}
                            </div>
                        </details>
                    `).join('')}
                </div>
            </div>`;
        }

        function renderizarCartao(container, status, xProd, chaveRef, nNF, cEAN, cProdNFD, cProdNFV, cstNFV, cstNFD, qComNFV, qComNFD, linhasTabela, divergencias, idCartao, chipsPorCategoria, infoRec, outras) {
            const el = document.createElement('div');
            el.className = `rounded-lg shadow border-l-4 mb-6 bg-white overflow-hidden ${
                status === 'match' ? 'border-emerald-500' : 
                status === 'divergente' ? 'border-red-500' : 'border-gray-500'
            }`;
            if (idCartao) el.id = idCartao;

            const icone = status === 'match' ? '✅ OK' : 
                          status === 'divergente' ? '❌ DIVERGENTE' : '⚠️ SEM NFV';
            const corTag = status === 'match' ? 'bg-emerald-100 text-emerald-800' : 
                           status === 'divergente' ? 'bg-red-100 text-red-800' : 'bg-gray-100 text-gray-800';

            let html = `
                <div class="p-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center">
                    <h3 class="font-bold text-slate-800">${xProd}</h3>
                    <span class="px-2.5 py-1 rounded-full text-xs font-bold ${corTag}">${icone}</span>
                </div>
                <div class="p-4 grid grid-cols-1 md:grid-cols-2 gap-4 text-sm text-slate-700">
                    <div>
                        <p><strong>Nº NF Referenciada:</strong> ${nNF}</p>
                        <p><strong>Chave Ref:</strong> <span class="font-mono text-xs">${chaveRef}</span></p>
                        <p><strong>EAN / GTIN:</strong> ${cEAN}</p>
                    </div>
                    <div>
                        <p><strong>Cód. (Dev / Venda):</strong> ${cProdNFD} / ${cProdNFV}</p>
                        <p><strong>CST (Dev / Venda):</strong> ${cstNFD} / ${cstNFV}</p>
                        <p><strong>Qtd (Dev / Venda):</strong> ${qComNFD} / ${qComNFV}</p>
                    </div>
                </div>
            `;

            if (infoRec) {
                html += `<div class="mx-4 mb-4 p-3 bg-blue-50 border border-blue-200 text-blue-800 rounded text-sm">${infoRec}</div>`;
            }

            if (divergencias && divergencias.length > 0) {
                html += `<div class="mx-4 mb-4 p-3 bg-red-50 border border-red-200 text-red-900 rounded text-sm">
                    <strong>Motivos da Divergência:</strong>
                    <ul class="list-disc pl-5 mt-1 space-y-1">${divergencias.map(d => `<li>${d}</li>`).join('')}</ul>
                </div>`;
            }

            if (status !== 'sem-nfv') {
                html += renderizarBlocoComparacao(chipsPorCategoria, linhasTabela);
                html += renderizarOutrasNotas(outras);
            }

            el.innerHTML = html;
            container.appendChild(el);
        }
    </script>
</body>
</html>
